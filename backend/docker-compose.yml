services:
  ktester:
    build: .
    image: ktester-backend:latest
    container_name: ktester
    restart: unless-stopped
    # Bind to 127.0.0.1 only — nginx on the host will proxy in.
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      LISTEN_ADDR: ":8080"
      DATA_DIR: "/app/data"
      JWT_SECRET: "${JWT_SECRET}"
      SUPER_ADMIN_USER: "${SUPER_ADMIN_USER}"
      SUPER_ADMIN_PASS: "${SUPER_ADMIN_PASS}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
