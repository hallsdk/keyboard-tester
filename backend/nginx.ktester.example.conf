# Sample nginx site for ktester. Copy to /etc/nginx/sites-available/ktester
# and symlink into sites-enabled. Run `certbot --nginx -d ktester.hallsdk.com`
# AFTER the HTTP-only block below is working — certbot will rewrite this file
# to add the listen 443 / ssl_certificate blocks automatically.

server {
    listen 80;
    server_name ktester.hallsdk.com;

    # Big enough to upload a layout file.
    client_max_body_size 8m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE/WebSocket-friendly (not used today but harmless).
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
